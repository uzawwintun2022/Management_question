<!DOCTYPE html>
<html lang="my">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Fill in the Blank Quiz</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Pyidaungsu', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #f4f6f9;
            color: #333;
            padding-bottom: 40px;
            font-size: 14pt;
        }

        .header-panel {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            padding: 25px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .header-panel h1 {
            font-size: 20pt;
            margin-bottom: 12px;
        }

        .score-board {
            background-color: rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            border-radius: 20px;
            display: inline-block;
            font-weight: bold;
            font-size: 15pt;
        }

        .container {
            max-width: 900px;
            margin: 20px auto;
            padding: 20px;
        }

        .nav-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 40px;
            margin-bottom: 25px;
        }

        .nav-btn {
            background-color: #fff;
            color: #1e3c72;
            border: 2px solid #1e3c72;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13pt;
            text-align: center;
            text-decoration: none;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-buttons .download-btn:last-child {
            grid-column: 2;
        }

        .nav-btn:hover,
        .nav-btn.active {
            background-color: #1e3c72;
            color: #fff;
        }

        .nav-btn.download-btn {
            background-color: #28a745;
            color: white;
            border-color: #28a745;
        }

        .nav-btn.download-btn:hover {
            background-color: #218838;
        }

        .section-title {
            background-color: #e9ecef;
            border-left: 6px solid #1e3c72;
            padding: 15px;
            margin-bottom: 25px;
            border-radius: 0 8px 8px 0;
            font-size: 16pt;
            font-weight: bold;
        }

        .question-card {
            background: #fff;
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
            line-height: 2;
        }

        .question-text {
            font-size: 14pt;
            margin-bottom: 12px;
        }

        .blank-input {
            border: none;
            border-bottom: 3px solid #6c757d;
            padding: 4px 8px;
            font-size: 14pt;
            font-weight: bold;
            color: #1e3c72;
            text-align: center;
            width: 200px;
            background-color: #fffde7;
            outline: none;
            transition: border-color 0.3s;
        }

        .blank-input:focus {
            border-bottom-color: #1e3c72;
            background-color: #fff;
        }

        .feedback {
            margin-top: 12px;
            font-weight: bold;
            font-size: 13pt;
            display: none;
        }

        .feedback.correct {
            color: #28a745;
        }

        .feedback.incorrect {
            color: #dc3545;
        }

        .action-panel {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-top: 25px;
            margin-bottom: 25px;
            padding: 10px;
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        }

        .action-btn {
            padding: 14px 40px;
            font-size: 14pt;
            font-weight: bold;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s, opacity 0.2s;
        }

        .action-btn:active {
            transform: scale(0.98);
        }

        .btn-check {
            background-color: #007bff;
            color: white;
        }

        .btn-try {
            background-color: #6c757d;
            color: white;
        }

        footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: #212529;
            color: #f8f9fa;
            text-align: center;
            padding: 15px;
            font-size: 12pt;
            box-shadow: 0 -2px 5px rgba(0, 0, 0, 0.1);
            z-index: 1000;
        }

        @media (max-width: 600px) {
            body {
                font-size: 12pt;
                padding-bottom: 40px;
            }

            .nav-buttons {
                grid-template-columns: repeat(2, 1fr);
                gap: 8px;
            }

            .nav-buttons .download-btn:last-child {
                grid-column: span 2;
            }

            .header-panel h1 {
                font-size: 16pt;
            }

            .score-board {
                font-size: 13pt;
            }

            .nav-btn {
                font-size: 11pt;
                padding: 10px 5px;
            }

            .blank-input {
                width: 160px;
                font-size: 12pt;
            }

            .action-btn {
                padding: 12px 25px;
                font-size: 12pt;
            }
        }
    </style>
</head>

                    { id: 4, text: "<b>စီမံကိန်းအကောင်အထည်ဖော်ဆောင်ရွက်ခြင်း</b>သည် <b>စီမံကိန်းသံသရာစက်ဝန်း (Project Life Cycle) </b>၏ <b>_______</b> ဖြစ်သည်။", ans: "တတိယအဆင့်" },
                    { id: 5, text: "<b>မှန်ကန်သော စီမံကိန်းတစ်ခုကို </b>ရွေးချယ်ဆောင်ရွက်နိုင်ရန်အတွက် <b>_____</b> ဖြစ်နိုင်ချေကို ထည့်သွင်းစဉ်းစားရမည်။", ans: "ဘဏ္ဍာဆိုင်ရာ" },
                    { id: 6, text: "<b>________</b> သည် <b>(WBS)</b> စီမံကိန်းအောင်မြင်ရန်အတွက် အဓိကသော့ ချက်ဖြစ်သည်။", ans: "အလုပ်ခွဲခြမ်းဖွဲ့စည်းပုံ" },
                    { id: 7, text: "<b>_______</b> သည် စီမံကိန်းတစ်ခုအောင်မြင်ရန်အတွက် အဓိကသော့ချက်ဖြစ်သည်။", ans: "ဆက်သွယ်ဆက်ဆံမှုပြုခြင်း" },
                    { id: 8, text: "<b>________</b> တွင် <b>အဆင့် (၅) ဆင့်</b> ပါဝင်ပါသည်။", ans: "စီမံကိန်းသံသရာစက်ဝိုင်း" },
                    { id: 9, text: "စီမံကိန်းတစ်ခုဆောင်ရွက်ရာတွင် ထည့်သွင်းစဉ်းစားရမည့် <b>နယ်ပယ်</b> <b>______</b> ခု ရှိပါသည်။", ans: "၁၀" },
                    { id: 10, text: "<b>Risk </b>သည် စီမံကိန်းများကို နှောင့်နှေးစေနိုင်သည့်အတွက် <b>______</b> သည် စီမံကိန်း၏ အရေးကြီးသော အစိတ်အပိုင်းတစ်ခုဖြစ်သည်။", ans: "Risk Management" },
                    { id: 11, text: "<b>_______</b> သည် <b>အလုပ်ပြီးမြောက်ရန်အတွက်</b> လိုအပ်သော <b>အဓိကအရည်အချင်း</b> ဖြစ်သည်။", ans: "လူကိုစီမံခန့်ခွဲနိုင်ခြင်း" },
                    { id: 12, text: "<b>_______</b> သည် အဖွဲ့ဝင်များအား <b>အဖွဲ့လိုက် ဆောင်ရွက်တတ်စေရန်</b> လေ့ကျင့်ပေးရမည်။", ans: "စီမံကိန်းမန်နေဂျာ" },
                    { id: 13, text: "မည်သည့်စီမံကိန်းမဆို စီမံကိန်းမစတင်မီ <b>_______</b> ပြုလုပ်ရမည် ဖြစ်သည်။", ans: "ကြိုတင်စီမံမှုများ" },
                    { id: 14, text: "<b>စာမေးပွဲအတွက်ပြင်ဆင်ခြင်း</b>သည် <b>_______</b> တွင် ပါဝင်ပါသည်။", ans: "ပုဂ္ဂိုလ်ရေးဆိုင်ရာစီမံကိန်း" },
                    { id: 15, text: "<b>______</b> တွင် <b>အရေးကြီးခြင်းနှင့် အမြန်လုပ်ခြင်း ရှိ၊ မရှိ </b>ထည့်သွင်းစဉ်းစားရမည်။", ans: "အချိန်စီမံခန့်ခွဲခြင်း" },
                    { id: 16, text: "<b>_______</b> ကို လျော့ချသည့်နေရာတွင် <b>Impact သက်ရောက်မှုထက်  Probability ဖြစ်နိုင်ချေ</b>ကို အရင် လျော့ချရမည်။", ans: "Risk" },
                    { id: 17, text: "<b>ကျင့်ဝတ်</b> ဆိုသည်မှာ နေ့စဉ်လူနေမှုဘဝတွင် မည်ကဲ့သို့ပြုမူနေထိုင်ရမည်ကို လမ်းညွှန်ထားသည့် <b>_______</b> စံနှုန်းဖြစ်သည်။", ans: "ကိုယ်ကျင့်တရားဆိုင်ရာ" },
                    { id: 18, text: "<b>ပြည်သူ့ဝန်ထမ်းများ ပြည်သူကို </b>ဝန်ဆောင်မှုပေးရာတွင် <b>အရေးကြီးဆုံး အခန်းကဏ္ဍ</b>သည် <b>_______</b> နှင့်အညီ ဖြစ်ရန်ဖြစ်သည်။", ans: "ကျင့်ဝတ်" },
                    { id: 19, text: "အဖွဲ့အစည်းအားလုံးကျင့်ဝတ်နှင့် ပြည့်စုံမည်ဆိုပါက ပြည်သူများ၏  အဖွဲ့အစည်းအပေါ် <b>_______</b> ရရှိမည်ဖြစ်သည်။", ans: "ယုံကြည်မှု" },
                    { id: 20, text: "<b>လူတစ်ဦး (သို့မဟုတ်) အဖွဲ့အစည်း</b>တစ်ခုနှင့်တစ်ခု <b>တန်ဖိုးထားမှု</b>အား မတူညီသောအခါ <b>_______</b> ဖြစ်ပေါ်လာနိုင်သည်။", ans: "ပဋိပက္ခ" },
                    { id: 21, text: "<b>ပြည်သူ့ဝန်ထမ်းတစ်ဦး</b>အနေဖြင့် <b>အဂတိလိုက်စားခြင်း</b>သည် <b>_______</b> ဖြစ်သည်။", ans: "ကျင့်ဝတ်ဖောက်ဖျက်ခြင်း" },
                    { id: 22, text: "<b>_______</b> တွင် အဓိကအရေးပါသည့်အချက်မှာ ကျင့်ဝတ်နှင့်ညီသော <b>တာဝန်ခံမှုများ</b> ရှိခြင်းဖြစ်သည်။", ans: "ကျင့်ဝတ်နှင့်ညီသောခေါင်းဆောင်မှု" },
                    { id: 23, text: "<b>ကျင့်ဝတ်ဆိုင်ရာအကျပ်အတည်း</b>ကို ဖြေရှင်းမည်ဆိုပါက အဆင့် <b>_______</b> ဆင့် ဖြင့် ဖြေရှင်းရမည်။", ans: "၃" },
                    { id: 24, text: "<b>ပတ်ဝန်းကျင်ဆိုင်ရာစီမံခန့်ခွဲမှု</b>ကို ဆောင်ရွက်ခြင်းဖြင့် <b>_______</b> ဖွံ့ဖြိုးတိုးတက်မှု ပန်းတိုင်ကို အထောက်အကူပြုနိုင်မည် ဖြစ်သည်။", ans: "နိုင်ငံတော်" },
                    { id: 25, text: "<b>စီးပွားရေးလုပ်ငန်းရှင်များသည် မိမိအမြတ်များထဲမှ ဒေသတွင်း လူမှုရေးလုပ်ငန်းများ၌ ပါဝင်လှူဒါန်းခြင်း</b>သည် <b>_______</b> ဆောင်ရွက်ခြင်းဖြစ်သည်။", ans: "လူမှုအကျိုးပြု" },
                    { id: 26, text: "<b>ကိုယ်ကျင့်တရားဆိုင်ရာစံနှုန်းများ</b>သည် <b>ဘာသာရေး၊ ယဉ်ကျေးမှု၊ စိတ်ပိုင်းဆိုင်ရာ</b> <b>_______</b> ကို အခြေခံထားသည်။", ans: "ယုံကြည်မှု" }
                ]
            },
            3: {
                title: "၃။ ဝန်ဆောင်မှုဆိုင်ရာ စီမံခန့်ခွဲမှု & Leadership",
                questions: [
                    { id: 1, text: "<b>ဝန်ဆောင်မှု</b>သည် ဝန်ဆောင်မှုပေးနေသော အချိန်ကာလအတွင်း <b>_______</b> ပါက ပျက်စီးသွားနိုင်သည်။", ans: "အသုံးမပြုနိုင်" },
                    { id: 2, text: "<b>______</b> အား <b>ထုတ်ပိုးသိုလှောင် ဆည်းပူးထား၍</b> မရနိုင်ပေ။", ans: "ဝန်ဆောင်မှု" },
                    { id: 3, text: "<b>ဝန်ဆောင်မှု အရည်အသွေးသည်</b> <b>______</b> ပူးပေါင်းပါဝင် ဆောင်ရွက်မှုအပေါ်တွင်လည်း မူတည်သည်။", ans: "စားသုံးသူ" },
                    { id: 4, text: "<b>_______</b> အား ရုပ်ဝတ္ထုပစ္စည်းများကဲ့သို့ <b>ထိတွေ့ကိုင်တွယ်၍</b> မရနိုင်ပေ။", ans: "ဝန်ဆောင်မှု" },
                    { id: 5, text: "<b>_______</b> သည် <b>တစ်ကြိမ်နှင့်တစ်ကြိမ် မတူညီဘဲ ပြောင်းလဲ</b>တတ်သည်။", ans: "ဝန်ဆောင်မှုအရည်အသွေး" },
                    { id: 6, text: "ဝန်ဆောင်မှုများ၏ ထူးခြားသော <b>သွင်ပြင်လက္ခဏာများ</b>တွင် <b>_______</b> ပါဝင်မှုနှင့် <b>ပျက်စီးဆုံးရှုံးနိုင်မှု</b>တို့သည် အပြန်အလှန်ဆက်နွယ်နေပါသည်။", ans: "စားသုံးသူ" },
                    { id: 7, text: "<b>စားသုံးသူများ၏ ရိုးသားမှု</b>သည် <b>_______</b> စနစ်၏ <b>စွမ်းဆောင်ရည်ကို တိုက်ရိုက်သက်ရောက်</b>စေပါသည်။", ans: "ဝန်ဆောင်မှု" },
                    { id: 8, text: "<b>ဝန်ဆောင်မှုများတွင်</b> <b>______</b> နှင့် <b>သုံးစွဲမှု</b>သည် တစ်ပြိုင်နက်တည်း ဖြစ်သောကြောင့် <b>အရည်အသွေးထိန်းချုပ်မှု</b>အတွက် အခွင့်အလမ်းနည်းပါးသည်။", ans: "ထုတ်လုပ်မှု" },
                    { id: 9, text: "<b>_______</b> သည် <b>ဝန်ဆောင်မှုအား မခံယူမီ</b> ၎င်းတွင် ဝန်ဆောင်မှုနှင့်ပတ်သက်၍ <b>ကြိုတင်မျှော်လင့်ထားမှု</b> ရှိသည်။", ans: "စားသုံးသူ" },
                    { id: 10, text: "ဝန်ဆောင်မှုပေးမည့် သူအား ပံ့ပိုးပေးသူ နေရာ အပေါ်မူတည်၍ ၎င်းတို့၏ <b>_______</b> သည် ကွဲပြားနိုင်သည်။", ans: "အရည်အသွေး" },
                    { id: 11, text: "<b>စားသုံးသူသည် ဝန်ဆောင်မှုအား ကြိုတင်မျှော်လင့်ထားသည့်အတိုင်း</b> ရရှိပါက <b>_______</b> ရရှိမည် ဖြစ်သည်။", ans: "စိတ်ကျေနပ်မှု" },
                    { id: 12, text: "<b>________</b> ကောင်း၊ မကောင်းအား <b>စားသုံးသူမှ ဝန်ဆောင်မှု ခံယူနေသည့် အချိန်ပိုင်းအတွင်းနှင့် ဝန်ဆောင်မှုခံယူပြီး အချိန်</b>တွင် ဆုံးဖြတ်သည်။", ans: "ဝန်ဆောင်မှုအရည်အသွေး" },
                    { id: 13, text: "<b>ဝန်ဆောင်မှု အရည်အသွေး ရှုထောင့်</b>အား အချက် <b>________</b> ချက်ဖြင့် လေ့လာနိုင်ပါသည်။", ans: "၅" },
                    { id: 14, text: "ဝန်ဆောင်မှုအပေါ် စားသုံးသူမှ စိတ်ကျေနပ်မှု ရှိပါက <b>________</b> ကောင်းမွန်သည်ဟု သတ်မှတ်သည်။", ans: "ဝန်ဆောင်မှုအရည်အသွေး" },
                    { id: 15, text: "ဝန်ဆောင်မှုအရည်အသွေးအား <b>_______</b> ခံစားချက်များစွာဖြင့်လည်း တိုင်းတာသည်။", ans: "စိတ်ပိုင်းဆိုင်ရာ" },
                    { id: 16, text: " <b>_______</b>ကို လေ့ကျင့်သင်ကြားပေးခြင်းဖြင့် <b>ဝန်ဆောင်မှုအရည်အသွေး</b>အား ထိန်းထားနိုင်ပါသည်။", ans: "ဝန်ထမ်းများ" },
                    { id: 17, text: "<b>ခေါင်းဆောင်တစ်ဦး</b>သည် မိမိ၏ <b>_______</b> ကို စွမ်းအားနှင့်အညီ အသုံးပြုနိုင်စွမ်းရှိရန်လိုသည်။", ans: "အဖွဲ့အစည်း" },
                    { id: 18, text: "<b>_______</b> သည် <b>ခေါင်းဆောင်မှုဆိုင်ရာ အရည်အသွေးများ</b>ထဲ၌ တစ်ခုအပါအဝင် ဖြစ်သည်။", ans: "အမှားကိုဝန်ခံရဲခြင်း" },
                    { id: 19, text: "<b>ခေါင်းဆောင်မှုဆိုင်ရာအယူအဆ</b> <b>_______</b> မျိုး ရှိပါသည်။", ans: "၄" },
                    { id: 20, text: "<b>ထိရောက်ထက်မြက်သောခေါင်းဆောင်တစ်ဦး</b>ဖြစ်ရန် <b>_______</b> ပုံစံတစ်မျိုးတည်းကိုသာ ရေရှည်ကိုင်စွဲအသုံးပြုမသင့်ပေ။", ans: "ခေါင်းဆောင်မှု" },
                    { id: 21, text: "<b>ခေါင်းဆောင်တစ်ဦး</b>အနေဖြင့် <b>_______</b> များအား <b>အဖွဲ့လိုက် ဆောင်ရွက်တတ်စေရန်</b> လေ့ကျင့်ပျိုးထောင်ပေးရမည် ဖြစ်သည်။", ans: "လက်အောက်ဝန်ထမ်း" },
                    { id: 22, text: "<b>လက်အောက်ဝန်ထမ်းများ</b>သည် <b>ခေါင်းဆောင်ထံမှ အကြံဉာဏ်များ</b> ရယူလိုသည့် အခြေအနေမျိုးတွင် <b>_______</b> ကို မသုံးသင့်ပါ။", ans: "အာဏာရှင်ပုံစံခေါင်းဆောင်မှု" },
                    { id: 23, text: "<b>အပြစ်ပေးပိုင်ခြင်းဖြင့် လွှမ်းမိုးနိုင်သော စွမ်းရည်</b>သည် <b>ခေါင်းဆောင်တစ်ဦး</b>၏ <b>_______</b> (Position Power)ပင် ဖြစ်ပါသည်။", ans: "ရာထူးအာဏာစွမ်းရည်" },
                    { id: 24, text: "<b>“LEADERSHIP”</b> ဆိုသည့် စကားလုံးမှ <b>(R)</b> ၏ အဓိပ္ပာယ်မှာ <b>_______</b> ဖြစ်ပါသည်။", ans: "Respect(လေးစားမှုရှိခြင်း)" },
                    { id: 25, text: "<b>_______</b> ပုံစံခေါင်းဆောင်မှုသည် <b>နောက်လိုက်ဝန်ထမ်းများ၏ ဆွေးနွေးခြင်းကို လက်မခံသော</b> ပုံစံဖြစ်သည်။", ans: "Autocratic leadership" },
                    { id: 26, text: "ဆုံးဖြတ်ချက်ချရာတွင် <b>အဖွဲ့ဝင်များအား ပါဝင်ခွင့်ပေးသော ခေါင်းဆောင်မှုပုံစံ</b>မှာ <b>_______</b> ခေါင်းဆောင်မှု ဖြစ်သည်။", ans: "ဒီမိုကရေစီဆန်သော" }
                ]
            },
            4: {
                title: "၄။ အထွေထွေစီမံခန့်ခွဲမှုဘာသာရပ် & လူ့စွမ်းအားအရင်းအမြစ်စီမံခန့်ခွဲမှုဘာသာရပ်",
                questions: [
                    { id: 1, text: "<b>စီမံခန့်ခွဲသူသည် အဖွဲ့အစည်း</b>၏ <b>______</b> သို့ ရောက်ရှိအောင် မိမိလက်အောက် ဝန်ထမ်းများနှင့်အတူ လုပ်ငန်းလုပ်ဆောင်ရမည် ဖြစ်ပါသည်။", ans: "ရည်မှန်းချက်ပန်းတိုင်" },
                    { id: 2, text: "<b>စီမံလျာထားခြင်းဖြင့်</b> အလုပ်လုပ်ရာတွင် <b>________</b> စေမည်။", ans: "အချိန်ကုန်သက်သာ" },
                    { id: 3, text: "<b>_______</b> ဆိုသည်မှာ လူတစ်ဦးတစ်ယောက်အား <b>အခြားလူများမှ အရေးယူ ဆောင်ရွက်ခွင့်၊ အမိန့်ပေးပိုင်ခွင့်၊ လုပ်ဆောင်နိုင်ခွင့်</b>နှင့် ပတ်သက်၍ အပ်နှင်းထားသော <b>အာဏာ</b>ကို ခေါ်ပါသည်။", ans: "လုပ်ပိုင်ခွင့်" },
                    { id: 4, text: "<b>_______</b> ဆိုသည်မှာ <b>ကြီးကြပ်သူတစ်ဦး</b>အနေဖြင့် ထိရောက်စွာ <b>စီမံခန့်ခွဲနိုင်သော၊ ထိန်းချုပ်နိုင်သော၊ ကြီးကြပ်နိုင်သော လက်အောက်ခံ ဝန်ထမ်းဦးရေ</b> ဖြစ်သည်။", ans: "ကြီးကြပ်ကွပ်ကဲမှုအလှမ်း" },
                    { id: 5, text: "<b>_______</b> ဆိုသည်မှာ <b>ဖွဲ့စည်းပုံအဆင့်ဆင့်အတိုင်းစနစ်တကျ</b>  ဖွဲ့စည်းထားသော အဖွဲ့အစည်းဖြစ်သည်။", ans: "ပုံစံတကျအဖွဲ့အစည်း" },
                    { id: 6, text: "<b>_______</b> သည် <b>ရှင်းလင်း၍ နားလည်လွယ်</b>ရမည်။", ans: "ညွှန်ကြားချက်တစ်ခု" },
                    { id: 7, text: "<b>ဆက်သွယ်ခြင်း</b>ဆိုသည်မှာ <b>သတင်းအချက်အလက်များ၊ စိတ်ကူးစိတ်သန်းများ၊ အကြံဉာဏ်များ၊ ယူဆချက်များ</b>ကို <b>________</b> ဖြစ်သည်။", ans: "အပြန်အလှန်ဖလှယ်ခြင်း" },
                    { id: 8, text: "<b>________</b> ဆိုသည်မှာ <b>စံမှလွဲချော်ခြင်း</b> (သို့) <b>ဖြစ်သင့်သည်နှင့် ဖြစ်နေသည်တို့ လွဲချော်နေခြင်း</b>ပင် ဖြစ်ပါသည်။", ans: "ပြဿနာ" },
                    { id: 9, text: "<b>________</b> ဆိုသည်မှာ <b>ဝါသနာတူရာ၊ စရိုက်တူရာ</b> ဖွဲ့စည်းနေသော အုပ်စု အဖွဲ့အစည်းဖြစ်သည်။", ans: "ပုံစံမဲ့အဖွဲ့အစည်း" },
                    { id: 10, text: "<b>ဌာနခွဲခြားဖွဲ့စည်းရာတွင်</b> <b>________</b> တစ်ခုနှင့်တစ်ခု တူညီမှုမရှိနိုင်ပါ။", ans: "အဖွဲ့အစည်း" },
                    { id: 11, text: "<b>_______</b> ကောင်းမွန်ပါက <b>လုပ်ငန်းခွင် သာယာပြီး ဝန်ထမ်းများ စိတ်ပါဝင်စားစွာ </b>တာဝန်ထမ်းဆောင်မည် ဖြစ်ပါသည်။", ans: "စီမံခန့်ခွဲမှု" },
                    { id: 12, text: "<b>______</b> တစ်ဦးအနေဖြင့် <b>မဖြစ်မနေနေ့စဉ် လုပ်ဆောင်ရမည့် လုပ်ဆောင်ချက်</b>မှာ <b>ဆုံးဖြတ်မှုပြုခြင်း</b> ဖြစ်ပါသည်။", ans: "စီမံခန့်ခွဲသူ" },
                    { id: 13, text: "<b>စီမံခန့်ခွဲမှုတိုင်း</b>၏ ကြိုးစားမှု လုပ်ငန်းဦးတည်ချက်ဖြစ်သော <b>ရည်မှန်းချက်ပန်းတိုင်</b> <b>________</b> မျိုးရှိပါသည်။", ans: "၃" },
                    { id: 14, text: "<b>အဖွဲ့အစည်း</b>၏ <b>မဟာဗျူဟာ ရည်မှန်းချက်များ</b> သတ်မှတ်ခြင်းကို <b>________</b> <b>စီမံခန့်ခွဲသူ</b>များက လုပ်ဆောင်ရပါသည်။", ans: "အထက်အဆင့်" },
                    { id: 15, text: "<b>စီမံခန့်ခွဲမှုဆိုင်ရာ</b> <b>_______</b> များသည် <b>စီးပွားရေးလုပ်ငန်း အဖွဲ့အစည်း၊ အခြားလုပ်ငန်းအဖွဲ့အစည်းနှင့် အစိုးရအဖွဲ့အစည်းများ</b> တွင်လည်း အသုံးပြုနိုင်ပါသည်။", ans: "စည်းကမ်းနည်းလမ်း" },
                    { id: 16, text: "အဖွဲ့အစည်းများတွင် <b>_______</b> အယူအဆသမားများပြားပါက <b>လုပ်ငန်းများ ဆုံးရှုံးမှု</b>ရှိနိုင်မည် ဖြစ်သည်။", ans: "Theory X" },
                    { id: 17, text: "<b>အခြေခံအဆင့် စီမံခန့်ခွဲသူ</b>တစ်ဦး၏ အဓိကကျွမ်းကျင်မှုလိုအပ်ချက်မှာ <b>________</b> ဖြစ်ပါသည်။", ans: "နည်းပညာဆိုင်ရာကျွမ်းကျင်မှု" },
                    { id: 18, text: "ယေဘုယျအားဖြင့် <b>စီမံခန့်ခွဲမှု ဘုံအဆင့်</b> <b>_______</b> ဆင့် ရှိပါသည်။", ans: "၃" },
                    { id: 19, text: "သတ်မှတ်ချိန်တစ်ခုအတွင်း <b>________</b> နှင့် <b>ထုတ်ကုန်ပမာဏ အများဆုံး</b> ထုတ်လုပ်နိုင်ခြင်းသည် <b>စီမံခန့်ခွဲမှု၏ အနှစ်သာရ </b>ဖြစ်ပါသည်။", ans: "သွင်းအားစုအနည်းဆုံး" },
                    { id: 20, text: "<b>လူ့စွမ်းအားအရင်းအမြစ်စီမံခန့်ခွဲခြင်း</b>၏ အဓိက ရည်ရွယ်ချက်မှာ <b>________</b> ဖြစ်သည်။", ans: "ဝန်ထမ်းထိရောက်စီမံခြင်း" },
                    { id: 21, text: "<b>ဝန်ထမ်းသစ်စုဆောင်းခြင်း</b>ဆိုသည်မှာ <b>________</b> ဖြစ်ပါသည်။", ans: "လျှောက်လွှာခေါ်ယူခြင်း" },
                    { id: 22, text: "<b>အလုပ်ခွဲခြမ်းစိတ်ဖြာခြင်း</b>ဆိုသည်မှာ <b>______</b> ကို လေ့လာခြင်းဖြစ်ပါသည်။", ans: "လုပ်ငန်းအကြောင်း" },
                    { id: 23, text: "<b>ဝန်ထမ်း၏ လစာနှင့် အကျိုးခံစားခွင့်</b>သည် <b>_______</b> ၏ အစိတ်အပိုင်းဖြစ်သည်။", ans: "HRM" },
                    { id: 24, text: "<b>အလုပ်ပါဝင်ဆောင်ရွက်မှုအကဲဖြတ်ခြင်း</b>သည် <b>________</b> အတွက် အထောက်အကူပြုမှု တစ်ခုဖြစ်ပါသည်။", ans: "လျော်ကြေးပေးရန်" },
                    { id: 25, text: "<b>လူ့စွမ်းအားအရင်းအမြစ် အစီအစဉ်ရေးဆွဲခြင်း</b>၏ ရည်ရွယ်ချက်မှာ <b>______</b> ဖြစ်ပါသည်။", ans: "လုပ်သားလိုအပ်ချက်ခန့်မှန်းခြင်း" },
                    { id: 26, text: "<b>_______</b> သည် ဝန်ထမ်းများ၏ <b>ပင်ကိုယ်အသိစိတ်ဖြင့်</b> စွမ်းအားရှိသမျှ အလုပ်ပါဝင်ဆောင်ရွက်စေရန် ဖြစ်ပါသည်။", ans: "စေ့ဆော်မှုပြုခြင်း" }
                ]
            },
            5: {
                title: "၅။ ဌာနဆိုင်ရာ ငွေစာရင်းကိုင်နည်း ဘာသာရပ်",
                questions: [
                    { id: 1, text: "<b>ဒုတိယ ၃ လပတ်</b>သည် <b>_________</b> ရက်နေ့မှ <b>စက်တင်ဘာလ ၃၀ ရက်</b>နေ့အထိ ဖြစ်သည်။", ans: "ဇူလိုင် ၁" },
                    { id: 2, text: "<b>ဦးစီးဌာနများ၏ အခြေခံစာရင်းပြုဌာနများအတွက် ငွေစာရင်းထိန်းသိမ်းရေး နည်းလမ်းညွှန်ကြားချက်</b>အား <b>_______</b> ရက်နေ့မှ စတင်၍ လိုက်နာဆောင်ရွက်ရပါမည်။", ans: "၁-၁၀-၁၉၇၂" },
                    { id: 3, text: "<b>ငွေကြေးရရှိရန်နည်းလမ်း</b>တွင် ပုံစံ ဌစ <b>______</b> စာအုပ်ဖြင့် စာရင်းရေးသွင်း ဆောင်ရွက်ရပါမည်။", ans: "၃" },
                    { id: 4, text: "<b>_______</b> စာရင်းစာအုပ် <b>ပုံစံ ဌစ(၇)</b> အား <b>လစဉ်စာရင်းပိတ်</b>ရမည်။", ans: "ဘဏ်ရငွေ" },
                    { id: 5, text: "<b>ပုံစံ ဌစ (၅)</b> သည် <b>______</b> လက်ဝယ် တိုက်ရိုက်အဝင်အထွက် ဖြစ်ပေါ်သောငွေကြေးကိစ္စများကို မှတ်တမ်းတင်သော ငွေစာရင်းစာအုပ် ဖြစ်သည်။", ans: "ငွေထုတ်ယူအရာရှိ" },
                    { id: 6, text: "<b>______</b> ပုံစံသည် <b>ချက်လက်မှတ်သိုလှောင်မှတ်ပုံတင်စာအုပ်</b> ဖြစ်ပါသည်။", ans: "ဌစ ၄" },
                    { id: 7, text: "<b>ဘဏ်ပေးငွေစာရင်းစာအုပ် ပုံစံ ဌစ (၈)</b> အား <b>______</b> စာရင်းပိတ်ရမည်။", ans: "လစဉ်" },

        let currentSection = 1;

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function loadSection(sectionId) {
            currentSection = sectionId;

            const buttons = document.querySelectorAll('.nav-btn');
            buttons.forEach((btn, index) => {
                if (index === sectionId - 1) btn.classList.add('active');
                else btn.classList.remove('active');
            });

            const data = quizData[sectionId];
            document.getElementById('section-title-display').innerText = data.title;

            document.getElementById('total-display').innerText = data.questions.length;
            document.getElementById('score-display').innerText = "0";

            const container = document.getElementById('quiz-container');
            container.innerHTML = '';

            data.questions.forEach((q, idx) => {
                const card = document.createElement('div');
                card.className = 'question-card';

                let questionNumberText = toBurmeseNumber(idx + 1) + "။ ";
                let textWithInput = q.text.replace(/_____+|________+/g, `<input type="text" class="blank-input" data-ans="${q.ans}" data-id="${q.id}">`);

                card.innerHTML = `
            <div class="question-text">${questionNumberText}${textWithInput}</div>
            <div class="feedback" id="feedback-${q.id}"></div>
        `;
                container.appendChild(card);
            });
        }

        function checkAnswers() {
            const inputs = document.querySelectorAll('.blank-input');
            let correctCount = 0;

            inputs.forEach(input => {
                const userAns = input.value.trim();
                const correctAns = input.getAttribute('data-ans').trim();
                const id = input.getAttribute('data-id');
                const feedbackEl = document.getElementById(`feedback-${id}`);

                if (userAns === correctAns) {
                    correctCount++;
                    feedbackEl.className = "feedback correct";
                    feedbackEl.innerText = `✓ အဖြေမှန်ပါသည်။ (အဖြေ: ${correctAns})`;
                    input.style.borderColor = "#28a745";
                } else {
                    feedbackEl.className = "feedback incorrect";
                    feedbackEl.innerText = `✗ မှားယွင်းနေပါသည်။ (အဖြေမှန်: ${correctAns})`;
                    input.style.borderColor = "#dc3545";
                }
                feedbackEl.style.display = "block";
            });

            document.getElementById('score-display').innerText = correctCount;
        }

        function tryAgain() {
            shuffleArray(quizData[currentSection].questions);
            loadSection(currentSection);
        }

        window.onload = function () {
            loadSection(1);
        };
    </script>
